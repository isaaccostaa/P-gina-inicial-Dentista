<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logonav.png" />
    <script>
      (function() {
        const img = new Image();
        img.src = '/Logonav.png';
        img.crossOrigin = 'Anonymous';
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const zoom = 1.2; // Aumenta minimamente a logo
          const size = Math.max(img.width, img.height);
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          
          // Center and scale the image in a square canvas
          const drawW = img.width * zoom;
          const drawH = img.height * zoom;
          const x = (size - drawW) / 2;
          const y = (size - drawH) / 2;
          ctx.drawImage(img, x, y, drawW, drawH);
          
          const imageData = ctx.getImageData(0, 0, size, size);
          const data = imageData.data;
          
          for (let i = 0; i < data.length; i += 4) {
            // If the pixel is very close to white, make it transparent
            if (data[i] > 235 && data[i+1] > 235 && data[i+2] > 235) {
              data[i+3] = 0;
            }
          }
          
          ctx.putImageData(imageData, 0, 0);
          
          const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
          link.type = 'image/png';
          link.rel = 'shortcut icon';
          link.href = canvas.toDataURL('image/png');
          document.getElementsByTagName('head')[0].appendChild(link);
        };
      })();
    </script>
    <meta name="color-scheme" content="dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dra. Kamille Gallego Vieira | Dentista em São Carlos</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
